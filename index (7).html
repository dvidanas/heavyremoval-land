<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heavy Removal — Junk Removal Service</title>
  <meta name="description" content="Fast, affordable junk removal. We show up, we haul it, you enjoy your space. Get a free quote today." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00;
      --dark:   #111111;
      --white:  #ffffff;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 4px;
      color: var(--white);
      line-height: 1;
      margin-bottom: .5rem;
    }
    .logo span { color: var(--orange); }
    .tagline {
      font-size: clamp(.85rem, 2vw, 1rem);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-bottom: 3rem;
    }
    .badge {
      display: inline-block;
      background: var(--orange);
      color: var(--dark);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: .5rem 1.25rem;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      max-width: 600px;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,.5);
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }
    .cta {
      display: inline-block;
      background: var(--orange);
      color: var(--dark);
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 3px;
      transition: opacity .2s;
    }
    .cta:hover { opacity: .85; }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: .7rem;
      color: rgba(255,255,255,.15);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="logo">HEAVY<span>.</span>REMOVAL</div>
  <div class="tagline">Junk Removal Service</div>
  <div class="badge">🚧 Website Coming Soon</div>
  <h1>WE'RE ALMOST READY TO HAUL</h1>
  <p>Full-service junk removal launching soon. Got something to move right now? Give us a call.</p>
  <a href="tel:+10000000000" class="cta">Call Us Now</a>
  <footer>heavyremoval.com — Coming Soon</footer>
</body>
</html>
